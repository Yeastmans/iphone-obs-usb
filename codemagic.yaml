workflows:
  ios-build:
    name: Build iPhone OBS Camera
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd ios
          xcodegen generate

      - name: Build app (unsigned)
        script: |
          cd ios
          xcodebuild \
            -project CameraStream.xcodeproj \
            -scheme CameraStream \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=CameraStream/Info.plist \
            CONFIGURATION_BUILD_DIR=build \
            build

      - name: Package as IPA
        script: |
          cd ios
          mkdir -p Payload
          cp -r build/CameraStream.app Payload/
          zip -r CameraStream.ipa Payload/
          rm -rf Payload

    artifacts:
      - ios/CameraStream.ipa

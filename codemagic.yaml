workflows:
  ios-build:
    name: Build iPhone OBS Camera
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd ios
          xcodegen generate

      - name: Build app (unsigned)
        script: |
          cd ios
          xcodebuild \
            -project CameraStream.xcodeproj \
            -scheme CameraStream \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=CameraStream/Info.plist \
            CONFIGURATION_BUILD_DIR=build \
            build

      - name: Patch Info.plist
        script: |
          PLIST="ios/build/CameraStream.app/Info.plist"
          echo "--- Info.plist before patch ---"
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app streams your camera to OBS on your computer over USB.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'This app streams your camera to OBS on your computer over USB.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocalNetworkUsageDescription string 'This app uses the local network to stream camera footage to OBS over USB.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSLocalNetworkUsageDescription 'This app uses the local network to stream camera footage to OBS over USB.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string 'audio'" "$PLIST" 2>/dev/null || true
          echo "--- Info.plist after patch ---"
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"

      - name: Package as IPA
        script: |
          cd ios
          mkdir -p Payload
          cp -r build/CameraStream.app Payload/
          zip -r CameraStream.ipa Payload/
          rm -rf Payload

    artifacts:
      - ios/CameraStream.ipa
